name: Update profile stats

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-profile-stats.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2
        with:
          card: stats
          core_version: 2.1.3
          options: "username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&title_color=02D9F7FF&icon_color=02D9F7FF&text_color=c9d1d9&bg_color=0d1117"
          path: assets/github-stats.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN || github.token }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2
        with:
          card: top-langs
          core_version: 2.1.3
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide_border=true&title_color=02D9F7FF&text_color=02D9F7FF&bg_color=0d1117"
          path: assets/top-langs.svg
          token: ${{ secrets.PROFILE_STATS_TOKEN || github.token }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update profile stats"
          git push
